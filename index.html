<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FirstLight</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#061535">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="FirstLight">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', -apple-system, sans-serif;
    background: #061535;
    color: #fff;
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* ── Loading ───────────────────────────────────────────── */
  .loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; min-height: 100vh;
  }
  .spinner {
    width: 44px; height: 44px;
    border: 3px solid rgba(56,225,240,.18);
    border-top-color: #38E1F0;
    border-radius: 50%;
    animation: spin .75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { font-size: 13px; color: rgba(255,255,255,.35); letter-spacing: .04em; }

  /* ── Login ─────────────────────────────────────────────── */
  .login-page {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; min-height: 100dvh;
    padding: 24px 20px;
  }
  .login-wrap { width: 100%; max-width: 360px; }

  .brand { text-align: center; margin-bottom: 36px; }
  .brand-name {
    font-size: 32px; font-weight: 800; letter-spacing: -.03em;
    background: linear-gradient(135deg, #2E7CF7, #38E1F0);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .brand-sub {
    font-size: 11px; color: rgba(255,255,255,.3);
    text-transform: uppercase; letter-spacing: .14em; margin-top: 6px;
  }

  .card {
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.09);
    border-radius: 18px;
    padding: 28px 24px 24px;
  }

  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 11px; font-weight: 600;
    color: rgba(255,255,255,.45); text-transform: uppercase;
    letter-spacing: .1em; margin-bottom: 7px;
  }
  .field input {
    width: 100%;
    background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.11);
    border-radius: 11px;
    padding: 14px 15px;
    font-size: 16px; font-family: inherit;
    color: #fff; outline: none;
    transition: border-color .2s;
    -webkit-appearance: none;
  }
  .field input:focus { border-color: rgba(56,225,240,.45); }
  .field input::placeholder { color: rgba(255,255,255,.22); }

  .btn {
    width: 100%; padding: 15px;
    border: none; border-radius: 11px;
    background: linear-gradient(135deg, #2E7CF7, #38E1F0);
    color: #fff; font-size: 16px; font-weight: 700;
    font-family: inherit; cursor: pointer; margin-top: 4px;
    letter-spacing: -.01em;
    transition: opacity .2s;
  }
  .btn:disabled { opacity: .6; cursor: default; }
  .err {
    color: #E07878; font-size: 13px;
    text-align: center; margin-top: 14px; min-height: 18px;
    line-height: 1.4;
  }

  /* ── Top bar (shown over briefing) ─────────────────────── */
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 999;
    background: rgba(6,21,53,.93);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(255,255,255,.07);
    display: flex; flex-direction: column;
    padding: 0 16px;
    padding-top: env(safe-area-inset-top);
  }
  .tb-row1 {
    display: flex; align-items: center; justify-content: space-between;
    height: 50px;
  }
  .tb-brand {
    font-size: 16px; font-weight: 800; letter-spacing: -.02em;
    background: linear-gradient(135deg, #2E7CF7, #38E1F0);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .tb-right { display: flex; align-items: center; gap: 10px; }
  .tb-date {
    font-size: 10px; color: rgba(255,255,255,.35);
    font-family: 'IBM Plex Mono', monospace; letter-spacing: .04em;
  }
  .tb-btn {
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.11);
    border-radius: 8px; color: rgba(255,255,255,.7);
    font-size: 11px; font-weight: 600;
    padding: 6px 12px; cursor: pointer;
    font-family: inherit;
  }

  /* ── Refresh action bar ─────────────────────────────────── */
  .tb-row2 {
    display: flex; align-items: center; justify-content: space-between;
    padding-bottom: 10px; gap: 12px;
  }
  .ref-btn {
    padding: 7px 16px;
    border: 1px solid rgba(255,255,255,.13);
    border-radius: 8px;
    background: rgba(255,255,255,.06);
    color: rgba(255,255,255,.8);
    font-size: 11px; font-weight: 600; font-family: inherit;
    cursor: pointer; letter-spacing: .02em;
    transition: opacity .2s, background .2s;
    white-space: nowrap;
  }
  .ref-btn:disabled { opacity: .4; cursor: default; }
  .ref-btn.active {
    background: rgba(56,225,240,.12);
    border-color: rgba(56,225,240,.35);
    color: #38E1F0;
  }
  .ref-meta {
    display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
  }
  .ref-time {
    font-size: 10px; color: rgba(255,255,255,.35);
    font-family: 'IBM Plex Mono', monospace; letter-spacing: .04em;
  }
  .ref-status {
    font-size: 10px; color: #38E1F0;
    font-family: 'IBM Plex Mono', monospace; letter-spacing: .04em;
    min-height: 13px;
  }

  /* ── Briefing frame ─────────────────────────────────────── */
  .briefing-wrap {
    padding-top: calc(96px + env(safe-area-inset-top));
    height: 100vh; height: 100dvh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  #briefing-iframe {
    width: 100%; border: none; display: block;
    height: 100%;
  }

  /* ── Error state ───────────────────────────────────────── */
  .error-page {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; gap: 16px; padding: 32px;
    text-align: center;
  }
  .error-page p { font-size: 14px; color: rgba(255,255,255,.5); line-height: 1.6; }
  .error-page button {
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 10px; color: #fff;
    padding: 10px 20px; font-size: 13px; cursor: pointer;
    font-family: inherit;
  }

  /* ── Share button ───────────────────────────────────────── */
  .share-btn {
    display: inline-flex; align-items: center; gap: 5px;
    background: rgba(56,225,240,.1);
    border: 1px solid rgba(56,225,240,.25);
    border-radius: 8px; color: #38E1F0;
    font-size: 11px; font-weight: 600;
    padding: 6px 12px; cursor: pointer;
    font-family: inherit;
  }

  /* ── Share overlay + panel ──────────────────────────────── */
  .share-overlay {
    display: none; position: fixed; inset: 0; z-index: 9998;
    background: rgba(0,0,0,.55);
  }
  .share-overlay.open { display: block; }

  .share-panel {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 9999;
    background: #0A1F4D;
    border-top: 1px solid rgba(255,255,255,.1);
    border-radius: 18px 18px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
  }
  .share-panel.open { display: block; }

  .share-panel-title {
    font-size: 11px; font-weight: 600; color: rgba(255,255,255,.35);
    text-transform: uppercase; letter-spacing: .1em; margin-bottom: 14px;
  }
  .share-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .share-option {
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 12px; padding: 14px 16px;
    color: #fff; font-size: 13px; font-weight: 600;
    font-family: inherit; cursor: pointer; text-align: left;
    transition: background .15s;
  }
  .share-option:active { background: rgba(56,225,240,.12); }
  .share-opt-icon { font-size: 20px; display: block; margin-bottom: 6px; }
  .share-opt-sub { display: block; font-size: 10px; color: rgba(255,255,255,.35); font-weight: 400; margin-top: 2px; }

  /* ── Capturing toast ────────────────────────────────────── */
  .share-toast {
    display: none; position: fixed;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: #0A1F4D; border: 1px solid rgba(255,255,255,.1);
    border-radius: 14px; padding: 18px 24px; z-index: 99999;
    text-align: center; font-size: 13px; color: rgba(255,255,255,.7);
  }
  .share-toast.show { display: block; }
</style>
</head>
<body>

<div id="root">
  <div class="loading"><div class="spinner"></div><p>Loading…</p></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
// ── Config ────────────────────────────────────────────────────────
const SUPABASE_URL  = 'https://tqfupsvymisnskiwtjut.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxZnVwc3Z5bWlzbnNraXd0anV0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5ODExMzgsImV4cCI6MjA5NTU1NzEzOH0.t__izStKHDZvhlUtnnfTW4CB7ZtI8SUIPU0qqWGaByQ';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── Boot ──────────────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await db.auth.getSession();
  session ? await loadBriefing(session) : showLogin();

  db.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN')  await loadBriefing(session);
    if (event === 'SIGNED_OUT') showLogin();
  });
}

// ── Login ─────────────────────────────────────────────────────────
function showLogin() {
  document.getElementById('root').innerHTML = `
    <div class="login-page">
      <div class="login-wrap">
        <div class="brand">
          <div class="brand-name">FirstLight</div>
          <div class="brand-sub">Hotel Morning Briefing</div>
        </div>
        <div class="card">
          <div class="field">
            <label>Email</label>
            <input id="fl-email" type="email" placeholder="you@hotel.com"
                   autocomplete="email" inputmode="email">
          </div>
          <div class="field">
            <label>Password</label>
            <input id="fl-pass" type="password" placeholder="••••••••"
                   autocomplete="current-password">
          </div>
          <button class="btn" id="fl-btn" onclick="signIn()">Sign in</button>
          <div class="err" id="fl-err"></div>
        </div>
      </div>
    </div>`;
  setTimeout(() => document.getElementById('fl-email')?.focus(), 80);

  // Allow Enter key to submit
  document.addEventListener('keydown', function handler(e) {
    if (e.key === 'Enter') { signIn(); document.removeEventListener('keydown', handler); }
  });
}

async function signIn() {
  const email = document.getElementById('fl-email')?.value.trim();
  const pass  = document.getElementById('fl-pass')?.value;
  const btn   = document.getElementById('fl-btn');
  if (!email || !pass) { document.getElementById('fl-err').textContent = 'Enter email and password.'; return; }
  btn.textContent = 'Signing in…'; btn.disabled = true;
  const { error } = await db.auth.signInWithPassword({ email, password: pass });
  if (error) {
    document.getElementById('fl-err').textContent = error.message;
    btn.textContent = 'Sign in'; btn.disabled = false;
  }
}

// ── Briefing ──────────────────────────────────────────────────────
async function loadBriefing() {
  showSpinner('Fetching briefing…');

  // Look up which hotel this user belongs to
  const { data: hu, error: huErr } = await db
    .from('hotel_users').select('hotel_id').single();

  if (huErr || !hu) {
    showError('No hotel assigned to your account.<br>Contact your administrator.');
    return;
  }

  _hotelId = hu.hotel_id;

  // Fetch latest briefing
  const { data: b, error: bErr } = await db
    .from('briefings')
    .select('report_date, rendered_html, generated_at')
    .eq('hotel_id', hu.hotel_id)
    .order('report_date', { ascending: false })
    .limit(1)
    .single();

  if (bErr || !b?.rendered_html) {
    showError('No briefing available yet.<br>Check back after the next morning run.');
    return;
  }

  renderBriefing(b);
}

let _hotelId = null;
let _refreshSub = null;

function fmtTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' +
         d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

const SHARE_SECTIONS = [
  { id: 'sec-overview', label: 'Overview',    icon: '📊', sub: 'Yesterday KPIs' },
  { id: 'sec-pickup',   label: 'Pickup',      icon: '📈', sub: 'Activity cards' },
  { id: 'sec-pace',     label: 'Pace Charts', icon: '📉', sub: 'OTB vs STLY' },
  { id: 'sec-sources',  label: 'Sources',     icon: '🏨', sub: 'Top channels' },
  { id: 'sec-ai',       label: 'AI Insights', icon: '✨', sub: 'Smart summary' },
];

function renderBriefing(b) {
  const shareOpts = SHARE_SECTIONS.map(s =>
    `<button class="share-option" onclick="shareSection('${s.id}','${s.label}')">
      <span class="share-opt-icon">${s.icon}</span>${s.label}
      <span class="share-opt-sub">${s.sub}</span>
    </button>`
  ).join('');

  document.getElementById('root').innerHTML = `
    <div class="top-bar">
      <div class="tb-row1">
        <span class="tb-brand">FirstLight</span>
        <div class="tb-right">
          <span class="tb-date">${b.report_date}</span>
          <button class="share-btn" onclick="showSharePanel()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
              <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
              <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
            </svg>
            Share
          </button>
          <button class="tb-btn" onclick="signOut()">Sign out</button>
        </div>
      </div>
      <div class="tb-row2">
        <button class="ref-btn" id="btn-data" onclick="requestRefresh('data_only')">↻ Refresh Data</button>
        <div class="ref-meta">
          <span class="ref-time" id="ref-time">Last: ${fmtTime(b.generated_at)}</span>
          <span class="ref-status" id="ref-status"></span>
        </div>
      </div>
    </div>
    <div class="briefing-wrap">
      <iframe id="briefing-iframe" srcdoc="" scrolling="yes"></iframe>
    </div>
    <div class="share-overlay" id="share-overlay" onclick="hideSharePanel()"></div>
    <div class="share-panel" id="share-panel">
      <div class="share-panel-title">Share visual</div>
      <div class="share-options">${shareOpts}</div>
    </div>
    <div class="share-toast" id="share-toast">Preparing image…</div>`;

  const iframe = document.getElementById('briefing-iframe');
  iframe.addEventListener('load', () => {
    subscribeToPush();
    const hash = window.location.hash.replace('#', '');
    if (hash) navigateToSection(hash);
  }, { once: true });
  iframe.srcdoc = b.rendered_html;

  subscribeRefreshStatus();
}

async function requestRefresh(type) {
  if (!_hotelId) return;
  setRefreshUI('queued');
  await db.from('refresh_commands').insert({ hotel_id: _hotelId, type });
}

function setRefreshUI(state) {
  const btn      = document.getElementById('btn-data');
  const statusEl = document.getElementById('ref-status');
  if (!btn) return;

  const busy = state === 'queued' || state === 'running';
  btn.disabled = busy;

  if (state === 'queued') {
    btn.classList.add('active');
    btn.textContent = '↻ Queued…';
    statusEl.textContent = 'waiting for PC';
  } else if (state === 'running') {
    btn.textContent = '↻ Running…';
    statusEl.textContent = 'fetching data…';
  } else if (state === 'done') {
    statusEl.textContent = 'done — reloading';
    setTimeout(() => loadBriefing(), 1500);
  } else if (state === 'error') {
    btn.disabled = false;
    btn.classList.remove('active');
    btn.textContent = '↻ Refresh Data';
    statusEl.textContent = 'error — try again';
  } else {
    btn.classList.remove('active');
    btn.textContent = '↻ Refresh Data';
    statusEl.textContent = '';
  }
}

function subscribeRefreshStatus() {
  if (_refreshSub) { db.removeChannel(_refreshSub); _refreshSub = null; }
  if (!_hotelId) return;

  _refreshSub = db
    .channel('refresh-cmds')
    .on('postgres_changes', {
        event: '*',
        schema: 'public',
        table: 'refresh_commands',
        filter: `hotel_id=eq.${_hotelId}`,
      },
      payload => {
        const row = payload.new || {};
        if (row.status === 'running') setRefreshUI('running');
        if (row.status === 'done')    setRefreshUI('done');
        if (row.status === 'error')   setRefreshUI('error');
      }
    )
    .subscribe();
}

async function signOut() {
  if (_refreshSub) db.removeChannel(_refreshSub);
  await db.auth.signOut();
}

// ── Helpers ───────────────────────────────────────────────────────
function showSpinner(msg) {
  document.getElementById('root').innerHTML =
    `<div class="loading"><div class="spinner"></div><p>${msg}</p></div>`;
}

function showError(msg) {
  document.getElementById('root').innerHTML = `
    <div class="error-page">
      <p>${msg}</p>
      <button onclick="init()">Try again</button>
    </div>`;
}

// ── Push notifications ────────────────────────────────────────────
// Replace with your VAPID public key after running generate_vapid.py
const VAPID_PUBLIC_KEY = 'YOUR_VAPID_PUBLIC_KEY_HERE';

function _b64ToUint8(b64) {
  const pad = '='.repeat((4 - b64.length % 4) % 4);
  const raw = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/'));
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

async function subscribeToPush() {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  if (!VAPID_PUBLIC_KEY || VAPID_PUBLIC_KEY.startsWith('YOUR_')) return;
  try {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') return;
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: _b64ToUint8(VAPID_PUBLIC_KEY),
      });
    }
    const { data: { session } } = await db.auth.getSession();
    if (!session) return;
    await db.from('push_subscriptions').upsert(
      { hotel_id: _hotelId, user_id: session.user.id, subscription: sub.toJSON() },
      { onConflict: 'user_id' }
    );
  } catch (e) {
    console.warn('[push]', e);
  }
}

// ── Navigate to section (from notification tap) ───────────────────
function navigateToSection(sectionId) {
  const iframe = document.getElementById('briefing-iframe');
  if (!iframe) return;
  const scroll = () => iframe.contentDocument?.getElementById(sectionId)?.scrollIntoView({ behavior: 'smooth' });
  iframe.contentDocument?.readyState === 'complete' ? scroll() : iframe.addEventListener('load', scroll, { once: true });
}

// ── Share ─────────────────────────────────────────────────────────
function showSharePanel() {
  document.getElementById('share-overlay').classList.add('open');
  document.getElementById('share-panel').classList.add('open');
}

function hideSharePanel() {
  document.getElementById('share-overlay').classList.remove('open');
  document.getElementById('share-panel').classList.remove('open');
}

async function shareSection(sectionId, label) {
  hideSharePanel();
  const toast = document.getElementById('share-toast');
  toast.classList.add('show');
  try {
    const iframe  = document.getElementById('briefing-iframe');
    const iWin    = iframe.contentWindow;
    const iDoc    = iframe.contentDocument;

    if (!iWin.html2canvas) {
      await new Promise((res, rej) => {
        const s = iDoc.createElement('script');
        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
        s.crossOrigin = 'anonymous';
        s.onload = res; s.onerror = rej;
        iDoc.head.appendChild(s);
      });
    }

    const el = iDoc.getElementById(sectionId);
    if (!el) { toast.classList.remove('show'); return; }

    el.scrollIntoView();
    await new Promise(r => setTimeout(r, 300));

    const canvas = await iWin.html2canvas(el, {
      backgroundColor: '#F0F2F7', scale: 2, useCORS: true, logging: false,
    });

    toast.classList.remove('show');

    await new Promise(res => canvas.toBlob(async blob => {
      const file = new File([blob], `firstlight-${label.toLowerCase().replace(/\s+/g,'-')}.png`, { type: 'image/png' });
      if (navigator.canShare?.({ files: [file] })) {
        await navigator.share({ files: [file], title: `FirstLight — ${label}` });
      } else {
        const a = Object.assign(document.createElement('a'), {
          href: URL.createObjectURL(blob),
          download: `firstlight-${label.toLowerCase()}.png`,
        });
        a.click();
        URL.revokeObjectURL(a.href);
      }
      res();
    }, 'image/png'));
  } catch (e) {
    console.warn('[share]', e);
    toast.classList.remove('show');
  }
}

// ── Service Worker ────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(e => console.warn('[sw]', e));
  navigator.serviceWorker.addEventListener('message', event => {
    if (event.data?.type === 'NAVIGATE') navigateToSection(event.data.sectionId);
  });
}

init();
</script>
</body>
</html>
